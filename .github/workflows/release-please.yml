name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Notificar Slack sobre o Release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL não configurado; pulando notificação."
            exit 0
          fi
          NUMBER=$(printf '%s' "$PR_JSON" | jq -r '.number // empty')
          TITLE=$(printf '%s' "$PR_JSON" | jq -r '.title // empty')
          BODY=$(printf '%s' "$PR_JSON" | jq -r '.body // empty')
          VERSION=$(printf '%s' "$TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          URL="https://github.com/${REPO}/pull/${NUMBER}"

          # Converte o Markdown do GitHub para o mrkdwn do Slack (links, títulos e bullets).
          BODY_MRKDWN=$(printf '%s' "$BODY" \
            | sed -E 's/\[([^][]+)\]\(([^()]+)\)/<\2|\1>/g' \
            | sed -E 's/^#{1,6}[[:space:]]+(.*)$/*\1*/' \
            | sed -E 's/^\*[[:space:]]+/• /')

          # Slack aceita ~40000 chars no campo text; trunca por segurança em PRs muito grandes.
          if [ "$(printf '%s' "$BODY_MRKDWN" | wc -c)" -gt 3500 ]; then
            BODY_MRKDWN="$(printf '%s' "$BODY_MRKDWN" | cut -c1-3500)"
            BODY_MRKDWN="${BODY_MRKDWN}"$'\n'"…(conteúdo truncado — veja o PR completo)"
          fi

          TEXT=$(printf ':rocket: *Release PR pronto* — versão *%s* · <%s|abrir PR>\n\n%s' "${VERSION:-?}" "$URL" "$BODY_MRKDWN")
          jq -n --arg t "$TEXT" '{text: $t}' \
            | curl -sS -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
